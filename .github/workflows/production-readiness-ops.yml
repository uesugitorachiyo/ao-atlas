name: Production Readiness Ops

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  production-readiness:
    name: Production readiness
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout ao-atlas
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Production readiness
        if: matrix.os != 'windows-latest'
        shell: bash
        run: scripts/production-readiness.sh
      - name: Production readiness
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: scripts/production-readiness.ps1
